<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OASIS Market — Albion Online | by SO6iX OASIS</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --parch:#c8a96e;--parch2:#b8955a;--parch3:#a07840;
  --parch-bg:#f5e8c8;--parch-bg2:#ede0b0;--parch-bg3:#e0cc90;
  --parch-dark:#2a1e0e;--parch-mid:#5a3e1e;--parch-muted:#8a6a3a;
  --frame:#4a3010;--frame2:#6a4820;--frame3:#8a6030;
  --red-btn:#8b1a1a;--red-btn2:#b02020;--red-glow:#ff4444;
  --t4:#4a7abf;--t5:#3a9a4a;--t6:#c8a820;--t7:#8a3abf;--t8:#c85020;
  --silver:#a8c8e8;
}
body{font-family:'Inter',sans-serif;background:#1a1208;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}

/* WINDOW FRAME */
.window{
  width:100%;max-width:920px;
  background:linear-gradient(180deg,#3d2a10 0%,#2a1e0c 100%);
  border:3px solid var(--frame2);
  border-radius:8px;
  box-shadow:0 0 0 1px #6a4820,0 8px 40px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,200,100,0.15);
  overflow:visible;position:relative;
}

/* TITLE BAR */
.titlebar{
  background:linear-gradient(180deg,#5a3a18 0%,#3a2510 100%);
  border-bottom:2px solid var(--frame2);
  padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-radius:5px 5px 0 0;
}
.titlebar-left{display:flex;align-items:center;gap:12px}
.market-icon{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#c8a84b,#8a6020);
  border:2px solid var(--frame3);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}
.market-title{font-family:'Cinzel',serif;font-size:18px;color:#f0d080;text-shadow:0 1px 3px rgba(0,0,0,0.8)}
.market-sub{font-size:11px;color:var(--parch-muted);margin-top:2px}
.silver-display{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,0.3);border:1px solid var(--frame3);border-radius:20px;padding:5px 12px}
.silver-icon{font-size:16px}
.silver-amount{font-family:'Cinzel',serif;font-size:13px;color:#a8d8f8;font-weight:600}
.close-btn{width:24px;height:24px;background:var(--red-btn);border:1px solid #c03030;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:#ffaaaa;transition:all 0.15s;margin-left:8px}
.close-btn:hover{background:var(--red-btn2);color:#fff}

/* FILTER BAR */
.filterbar{
  background:linear-gradient(180deg,#4a3218 0%,#382410 100%);
  border-bottom:2px solid var(--frame2);
  padding:10px 14px;
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
}

/* GAME-STYLE SELECT */
.g-select-wrap{position:relative}
.g-select{
  appearance:none;-webkit-appearance:none;
  background:linear-gradient(180deg,#5a3a18 0%,#3a2208 100%);
  border:1px solid var(--frame3);border-radius:4px;
  padding:6px 28px 6px 10px;
  font-size:12px;color:var(--parch);font-family:inherit;
  cursor:pointer;outline:none;min-width:110px;
  transition:border-color 0.15s;
}
.g-select:hover{border-color:var(--parch2)}
.g-select:focus{border-color:var(--parch)}
.g-arrow{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--parch-muted);font-size:10px;pointer-events:none}

/* SEARCH BOX */
.search-wrap{position:relative;flex:1;min-width:160px}
.g-search{
  width:100%;
  background:linear-gradient(180deg,#2a1808 0%,#1e1006 100%);
  border:1px solid var(--frame3);border-radius:4px;
  padding:6px 32px 6px 10px;
  font-size:12px;color:var(--parch);font-family:inherit;outline:none;
}
.g-search::placeholder{color:var(--parch-muted)}
.g-search:focus{border-color:var(--parch)}
.search-ico{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--parch-muted);font-size:13px;cursor:pointer}
.search-ico:hover{color:var(--parch)}

/* CATEGORY MENU */
.catbar{
  background:linear-gradient(180deg,#3a2810 0%,#281a08 100%);
  border-bottom:2px solid var(--frame2);
  padding:8px 14px;
  display:flex;gap:4px;flex-wrap:wrap;
}
.cat-item{position:relative}
.cat-btn{
  background:linear-gradient(180deg,#5a3a18 0%,#3a2208 100%);
  border:1px solid var(--frame3);border-radius:4px;
  padding:6px 12px;font-size:12px;color:var(--parch);
  cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;
  transition:all 0.15s;white-space:nowrap;
}
.cat-btn:hover,.cat-btn.open{
  background:linear-gradient(180deg,#7a5228 0%,#5a3818 100%);
  border-color:var(--parch2);color:#f0d080;
}
.cat-btn.active{border-color:var(--parch);color:#f0d080;background:linear-gradient(180deg,#6a4220 0%,#4a2c10 100%)}

/* DROPDOWNS */
.sub-menu,.sub-menu2{
  position:absolute;min-width:170px;
  background:linear-gradient(180deg,#4a3218 0%,#2e1e0a 100%);
  border:1px solid var(--frame3);border-radius:4px;
  padding:3px;z-index:500;display:none;
  box-shadow:0 6px 20px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,200,100,0.08);
}
.sub-menu{top:calc(100% + 3px);left:0}
.sub-menu2{top:0;left:calc(100% + 3px)}
.cat-item:hover>.sub-menu,.sub-menu:hover,.sub-item:hover>.sub-menu2,.sub-menu2:hover{display:block}
.sub-item{position:relative}
.sub-btn,.leaf-btn{
  width:100%;background:transparent;border:none;border-radius:3px;
  padding:6px 10px;font-size:12px;color:var(--parch);
  cursor:pointer;font-family:inherit;text-align:left;
  display:flex;align-items:center;justify-content:space-between;
  transition:background 0.1s;white-space:nowrap;
}
.sub-btn:hover,.leaf-btn:hover{background:rgba(200,168,75,0.15);color:#f0d080}
.leaf-btn.active{background:rgba(200,168,75,0.2);color:#f0d080;font-weight:500}
.menu-div{height:1px;background:var(--frame2);margin:2px 4px}

/* RESULTS HEADER */
.results-header{
  background:linear-gradient(180deg,#4a3218 0%,#382510 100%);
  border-bottom:1px solid var(--frame2);
  padding:8px 14px;
  display:grid;grid-template-columns:260px 1fr 1fr 1fr 1fr;gap:8px;
  font-size:11px;color:var(--parch-muted);font-weight:500;text-transform:uppercase;letter-spacing:0.4px;
}

/* RESULTS AREA */
.results-area{
  background:linear-gradient(180deg,#f5e8c0 0%,#ede0a8 100%);
  min-height:300px;border-radius:0 0 5px 5px;
}

.result-row{
  display:grid;grid-template-columns:260px 1fr 1fr 1fr 1fr;gap:8px;
  padding:8px 14px;align-items:center;
  border-bottom:1px solid rgba(90,60,20,0.2);
  transition:background 0.1s;cursor:pointer;position:relative;
}
.result-row:last-child{border-bottom:none}
.result-row:hover{background:rgba(200,168,75,0.15)}
.result-row:hover .row-tooltip{display:block}

/* ITEM CELL */
.item-cell{display:flex;align-items:center;gap:10px}
.item-icon-wrap{position:relative;flex-shrink:0}
.item-icon{
  width:46px;height:46px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;position:relative;overflow:hidden;
}
.item-icon::before{content:'';position:absolute;inset:0;border-radius:3px;border:2px solid transparent}
.tier-frame{position:absolute;inset:0;border-radius:3px;border:2px solid}
.tier-corner{position:absolute;bottom:1px;left:1px;width:18px;height:18px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:'Cinzel',serif}
.enchant-dot{position:absolute;top:1px;right:1px;width:8px;height:8px;border-radius:50%}

.t4-frame{border-color:var(--t4);background:rgba(74,122,191,0.2)}
.t5-frame{border-color:var(--t5);background:rgba(58,154,74,0.2)}
.t6-frame{border-color:var(--t6);background:rgba(200,168,32,0.2)}
.t7-frame{border-color:var(--t7);background:rgba(138,58,191,0.2)}
.t8-frame{border-color:var(--t8);background:rgba(200,80,32,0.2)}
.t4-corner{background:var(--t4);color:#fff}
.t5-corner{background:var(--t5);color:#fff}
.t6-corner{background:var(--t6);color:#1a1000}
.t7-corner{background:var(--t7);color:#fff}
.t8-corner{background:var(--t8);color:#fff}
.e1-dot{background:#80c0ff}
.e2-dot{background:#ffdd44}
.e3-dot{background:#ff8844}

.item-info{flex:1;min-width:0}
.item-nm{font-size:13px;color:var(--parch-dark);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:11px;color:var(--parch-muted);margin-top:1px}

/* PRICE CELLS */
.price-cell{font-size:13px;color:var(--parch-dark);font-weight:500;display:flex;align-items:center;gap:4px}
.price-sell{color:#1a5a20}
.price-buy{color:#1a3a6a}
.price-zero{color:var(--parch-muted);font-size:12px}
.silver-s{font-size:11px;color:var(--parch-muted)}
.city-cell{font-size:11px;color:var(--parch-mid)}
.time-cell{font-size:11px;color:var(--parch-muted)}

/* TOOLTIP — global floating */
#globalTooltip{
  display:none;position:fixed;z-index:9999;pointer-events:none;
  background:linear-gradient(180deg,#3d2c14 0%,#22180a 100%);
  border:2px solid var(--frame3);border-radius:6px;
  padding:0;min-width:240px;max-width:280px;
  box-shadow:0 0 0 1px #6a4820,0 12px 32px rgba(0,0,0,0.85),inset 0 1px 0 rgba(255,200,100,0.12);
  overflow:hidden;
}
.tt-top{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--frame2);background:linear-gradient(180deg,#4a3218 0%,#362410 100%)}
.tt-img-wrap{width:52px;height:52px;flex-shrink:0;border-radius:4px;overflow:hidden;border:2px solid var(--frame3);background:#1a1008;display:flex;align-items:center;justify-content:center;position:relative}
.tt-img-wrap img{width:100%;height:100%;object-fit:cover}
.tt-img-tier{position:absolute;bottom:1px;left:1px;font-size:8px;font-weight:700;font-family:'Cinzel',serif;padding:1px 4px;border-radius:2px;line-height:1.4}
.tt-head{flex:1;min-width:0}
.tt-name{font-family:'Cinzel',serif;font-size:13px;color:#f0d080;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tt-quality{font-size:11px;color:var(--parch-muted)}
.tt-body{padding:8px 12px}
.tt-row{display:flex;justify-content:space-between;gap:16px;margin-bottom:5px;font-size:12px;align-items:center}
.tt-row:last-child{margin-bottom:0}
.tt-label{color:var(--parch-muted)}
.tt-val{color:var(--parch);font-weight:500}
.tt-sell{color:#4caf82;font-weight:600}
.tt-buy{color:#4a9eff;font-weight:600}
.tt-div{height:1px;background:var(--frame2);margin:6px 0}

/* STATUS */
.status-bar{padding:6px 14px;background:rgba(0,0,0,0.3);border-bottom:1px solid var(--frame2);display:none;align-items:center;gap:8px;font-size:12px;color:var(--parch-muted)}
.dot{width:6px;height:6px;border-radius:50%;background:#4caf82}
.dot.loading{background:var(--parch2);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* EMPTY / LOADING */
.empty-state{text-align:center;padding:60px 20px;color:var(--parch-muted)}
.empty-icon{font-size:40px;margin-bottom:12px;filter:sepia(1) opacity(0.5)}
.empty-title{font-family:'Cinzel',serif;font-size:15px;color:var(--parch-mid);margin-bottom:6px}
.empty-sub{font-size:12px}
.loading-state{text-align:center;padding:40px;color:var(--parch-muted);font-size:13px}

/* BOTTOM BAR */
.bottombar{
  background:linear-gradient(180deg,#3a2810 0%,#281a08 100%);
  border-top:2px solid var(--frame2);
  padding:8px 14px;
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:var(--parch-muted);
  border-radius:0 0 5px 5px;
}
.credit{color:var(--parch2);font-family:'Cinzel',serif;font-size:11px}

@media(max-width:640px){
  .results-header,.result-row{grid-template-columns:180px 1fr 1fr}
  .results-header>*:nth-child(n+4),.result-row>*:nth-child(n+4){display:none}
}
</style>
</head>
<body>

<div class="window">

  <!-- TITLE BAR -->
  <div class="titlebar">
    <div class="titlebar-left">
      <div class="market-icon">🏪</div>

      <span class="g-arrow">▼</span>
    </div>
    <div class="g-select-wrap">
      <select class="g-select" id="selEnchant" onchange="onFilterChange()">
        <option value="0">Enchantment — None</option>
        <option value="1">.1 — Blue</option>
        <option value="2">.2 — Yellow</option>
        <option value="3">.3 — Orange</option>
      </select>
      <span class="g-arrow">▼</span>
    </div>
    <div class="g-select-wrap">
      <select class="g-select" id="selQuality" onchange="onFilterChange()">
        <option value="1">Normal</option>
        <option value="2">Good</option>

    <div class="g-select-wrap">

        <option value="Fort Sterling">Fort Sterling</option>
        <option value="Lymhurst">Lymhurst</option>
        <option value="Martlock">Martlock</option>
        <option value="Thetford">Thetford</option>
        <option value="Black Market">Black Market</option>
      </select>
      <span class="g-arrow">▼</span>
    </div>
    <div class="search-wrap">
      <input class="g-search" id="searchInput" type="text" placeholder="Search Item ID..." autocomplete="off">
      <span class="search-ico" onclick="doSearch()">🔍</span>
    </div>
  </div>

  <!-- CATEGORY MENU -->
  <div class="catbar" id="catBar"></div>

  <!-- STATUS -->
  <div id="statusBar" class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText"></span>
  </div>

  <!-- RESULTS HEADER -->
  <div class="results-header">
    <div>Item</div>
    <div>City</div>
    <div>Sell Price</div>
    <div>Buy Price</div>
    <div>Updated</div>
  </div>

  <!-- RESULTS -->
  <div class="results-area" id="results"></div>

  <!-- BOTTOM BAR -->
  <div class="bottombar">
    <span>Real-time data from Albion Online Data Project</span>
    <span class="credit">by SO6iX OASIS</span>
  </div>

</div>

const ITEM_ICONS = {
  SWORD:'⚔️',AXE:'🪓',DAGGER:'🗡️',SPEAR:'🏹',HAMMER:'🔨',
  CROSSBOW:'🏹',BOW:'🏹',STAFF:'🪄',ARMOR:'🥋',HEAD:'⛑️',SHOES:'👢',
};

const TIER_COLORS = {4:'t4',5:'t5',6:'t6',7:'t7',8:'t8'};
const ENCHANT_COLORS = {1:'e1-dot',2:'e2-dot',3:'e3-dot'};
const QUALITY_LABELS = ['','Normal','Good','Outstanding','Excellent','Masterpiece'];
const CITY_COLORS = {Caerleon:'#e05555',Bridgewatch:'#e8a020','Fort Sterling':'#9ab0c8',Lymhurst:'#4caf82',Martlock:'#4a9eff',Thetford:'#9b6fd4','Black Market':'#888'};

let currentItem = null;
let activeLeaf = null;

function getItemIcon(id) {
  const u = id.toUpperCase();
  if(u.includes('SWORD')) return '⚔️';
  if(u.includes('AXE')) return '🪓';
  if(u.includes('DAGGER')||u.includes('CLAW')) return '🗡️';
  if(u.includes('SPEAR')||u.includes('GLAIVE')||u.includes('PIKE')) return '🔱';
  if(u.includes('HAMMER')||u.includes('MACE')) return '🔨';
  if(u.includes('BOW')||u.includes('CROSSBOW')) return '🏹';
  if(u.includes('STAFF')||u.includes('STAVE')) return '🪄';
  if(u.includes('ARMOR')||u.includes('ROBE')||u.includes('JACKET')) return '🥋';
  if(u.includes('HEAD')||u.includes('HOOD')||u.includes('HELMET')||u.includes('COWL')) return '⛑️';
  if(u.includes('SHOES')||u.includes('BOOTS')||u.includes('SANDALS')) return '👢';
  return '📦';
}

function buildItemId(baseId, tier, enchant) {
  const t = tier || document.getElementById('selTier').value || '5';
  const e = enchant !== undefined ? enchant : (document.getElementById('selEnchant').value || '0');
  const suffix = e > 0 ? `@${e}` : '';
  return `T${t}_${baseId}${suffix}`;
}

/* BUILD MENU */
function buildCatMenu() {
  const bar = document.getElementById('catBar');
  CATEGORIES.forEach(cat => {
    const wrap = document.createElement('div');
    wrap.className = 'cat-item';
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.innerHTML = cat.label + ' <span style="font-size:9px;opacity:0.5">▶</span>';
    btn.onclick = () => btn.classList.toggle('open');
    const sub = document.createElement('div');
    sub.className = 'sub-menu';
    cat.subs.forEach((s, si) => {
      const si_el = document.createElement('div');
      si_el.className = 'sub-item';
      const sb = document.createElement('button');
      sb.className = 'sub-btn';
      sb.innerHTML = s.label + ' <span style="font-size:9px;opacity:0.5">▶</span>';
      const sub2 = document.createElement('div');
      sub2.className = 'sub-menu2';
      s.items.forEach(it => {
        const lb = document.createElement('button');
        lb.className = 'leaf-btn';
        lb.textContent = it.n;
        lb.onclick = () => {
          if(activeLeaf) activeLeaf.classList.remove('active');
          lb.classList.add('active');
          activeLeaf = lb;
          currentItem = it;
          document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('open'));
          doSearchItem(it);
        };
        sub2.appendChild(lb);
      });
      si_el.appendChild(sb);
      si_el.appendChild(sub2);
      sub.appendChild(si_el);
      if(si < cat.subs.length-1){const d=document.createElement('div');d.className='menu-div';sub.appendChild(d);}
    });
    wrap.appendChild(btn);
    wrap.appendChild(sub);
    bar.appendChild(wrap);
  });
}

/* SEARCH */
function onTierChange(){ if(currentItem) doSearchItem(currentItem); }
function onFilterChange(){ if(currentItem) doSearchItem(currentItem); }

function doSearch() {
  const v = document.getElementById('searchInput').value.trim();
  if(!v) return;
  fetchAndRender(v.toUpperCase().replace(/ /g,'_'));
}

async function doSearchItem(it) {
  const tier = document.getElementById('selTier').value || '5';
  const enchant = document.getElementById('selEnchant').value || '0';
  const itemId = buildItemId(it.id, tier, enchant);
  document.getElementById('searchInput').value = itemId;
  await fetchAndRender(itemId);
}

async function fetchAndRender(itemId) {
  const quality = document.getElementById('selQuality').value || '1';
  const cityVal = document.getElementById('selCity').value;
  const cities = cityVal === 'all'
    ? 'Caerleon,Bridgewatch,Fort Sterling,Lymhurst,Martlock,Thetford,Black Market'
    : cityVal;

  setStatus(true, `Loading ${itemId}...`);
  document.getElementById('results').innerHTML = `<div class="loading-state">⏳ Fetching prices from Asia Server...</div>`;

  try {
    const url = `https://east.albion-online-data.com/api/v2/stats/prices/${itemId}?locations=${encodeURIComponent(cities)}&qualities=${quality}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('Failed to fetch');
    const data = await res.json();

    // update silver display with best price
    const best = data.filter(d=>d.sell_price_min>0).sort((a,b)=>a.sell_price_min-b.sell_price_min)[0];
    document.getElementById('silverDisplay').textContent = best ? formatSilver(best.sell_price_min) : '—';

    setStatus(false, `${data.length} results • ${new Date().toLocaleTimeString('th-TH')}`);
    renderRows(data, itemId);
  } catch(e) {
    setStatus(false,'Error');
    document.getElementById('results').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load prices</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

/* RENDER */
function formatSilver(v){ if(!v||v===0)return null; if(v>=1000000)return(v/1000000).toFixed(2)+'m'; if(v>=1000)return(v/1000).toFixed(1)+'k'; return v.toLocaleString(); }
function timeAgo(s){ if(!s||s.startsWith('0001'))return'—'; const d=(Date.now()-new Date(s).getTime())/1000; if(d<60)return'just now'; if(d<3600)return Math.floor(d/60)+'m ago'; if(d<86400)return Math.floor(d/3600)+'h ago'; return Math.floor(d/86400)+'d ago'; }

function renderRows(data, itemId) {
  const el = document.getElementById('results');
  const rows = data.filter(d => d.sell_price_min > 0 || d.buy_price_max > 0);

  if(!rows.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">No listings found</div><div class="empty-sub">Try a different city or quality</div></div>`;
    return;
  }

  rows.sort((a,b) => (a.sell_price_min||Infinity)-(b.sell_price_min||Infinity));

  const tier = parseInt((itemId.match(/^T(\d)/)||['','5'])[1]);
  const enchant = parseInt((itemId.match(/@(\d)$/)||['','0'])[1]);
  const tClass = TIER_COLORS[tier] || 't5';
  const icon = getItemIcon(itemId);
  const quality = parseInt(document.getElementById('selQuality').value)||1;

  let html = '';
  rows.forEach(d => {
    const sell = d.sell_price_min > 0 ? formatSilver(d.sell_price_min) : null;
    const buy = d.buy_price_max > 0 ? formatSilver(d.buy_price_max) : null;
    const cityColor = CITY_COLORS[d.city] || '#888';
    const age = timeAgo(d.sell_price_min_date);
    const name = itemId.replace(/@\d$/,'').replace(/^T\d_/,'').replace(/_/g,' ').toLowerCase().replace(/\b\w/g,l=>l.toUpperCase());
    const enchantDot = enchant > 0 ? `<div class="enchant-dot ${ENCHANT_COLORS[enchant]||''}"></div>` : '';

    html += `<div class="result-row" onmouseenter="showTooltip(${JSON.stringify(d).replace(/`/g,\'\')}, '${itemId}', ${quality})" onmouseleave="hideTooltip()">
      <div class="item-cell">
        <div class="item-icon-wrap">
          <div class="item-icon ${tClass}-frame">
            <span>${icon}</span>
            <div class="tier-frame ${tClass}-frame"></div>
            <div class="tier-corner ${tClass}-corner">T${tier}</div>
            ${enchantDot}
          </div>
        </div>
        <div class="item-info">
          <div class="item-nm">${name}</div>
          <div class="item-sub">${QUALITY_LABELS[quality]||'Normal'}${enchant>0?' · .'+enchant:''}</div>
        </div>
      </div>
      <div class="city-cell"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${cityColor};margin-right:5px;vertical-align:middle"></span>${d.city}</div>
      <div class="price-cell price-sell">${sell?sell+'<span class="silver-s"> s</span>':'<span class="price-zero">—</span>'}</div>
      <div class="price-cell price-buy">${buy?buy+'<span class="silver-s"> s</span>':'<span class="price-zero">—</span>'}</div>
      <div class="time-cell">${age}</div></div>
    </div>`;
  });
  el.innerHTML = html;
}

function setStatus(loading,text){
  const bar=document.getElementById('statusBar');
  bar.style.display='flex';
  document.getElementById('statusDot').className=loading?'dot loading':'dot';
  document.getElementById('statusText').textContent=text;
}

/* INIT */
buildCatMenu();

/* GLOBAL TOOLTIP */
const gtt = document.getElementById('globalTooltip');
document.addEventListener('mousemove', e => {
  if(gtt.style.display === 'block') {
    let x = e.clientX + 16, y = e.clientY + 8;
    if(x + 290 > window.innerWidth) x = e.clientX - 290;
    if(y + gtt.offsetHeight > window.innerHeight) y = e.clientY - gtt.offsetHeight - 8;
    gtt.style.left = x + 'px';
    gtt.style.top = y + 'px';
  }
});

function showTooltip(d, itemId, quality) {
  const tier = parseInt((itemId.match(/^T(\d)/)||['','5'])[1]);
  const enchant = parseInt((itemId.match(/@(\d)$/)||['','0'])[1]);
  const name = itemId.replace(/@\d$/,'').replace(/^T\d_/,'').replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase());
  const tClass = TIER_COLORS[tier]||'t5';
  const tierColors = {4:'#4a7abf',5:'#3a9a4a',6:'#c8a820',7:'#8a3abf',8:'#c85020'};
  const tierBg = tierColors[tier]||'#3a9a4a';
  const enchantLabels = {1:'.1',2:'.2',3:'.3'};

  // Albion render API for item icon
  const baseId = itemId.replace(/@\d$/,'');
  document.getElementById('ttImg').src = `https://render.albiononline.com/v1/item/${baseId}.png?size=60&quality=${quality||1}`;
  document.getElementById('ttImg').onerror = function(){ this.style.display='none'; };
  document.getElementById('ttTier').textContent = 'T'+tier+(enchant>0?'.'+enchant:'');
  document.getElementById('ttTier').style.background = tierBg;
  document.getElementById('ttTier').style.color = tier===6?'#1a1000':'#fff';
  document.getElementById('ttName').textContent = name;
  document.getElementById('ttQuality').textContent = (QUALITY_LABELS[quality||1]||'Normal') + (enchant>0?' · Enchanted '+enchantLabels[enchant]:'');
  document.getElementById('ttCity').textContent = d.city || '—';
  document.getElementById('ttSell').textContent = d.sell_price_min > 0 ? d.sell_price_min.toLocaleString() + ' silver' : '—';
  document.getElementById('ttBuy').textContent = d.buy_price_max > 0 ? d.buy_price_max.toLocaleString() + ' silver' : '—';
  document.getElementById('ttTime').textContent = timeAgo(d.sell_price_min_date);
  gtt.style.display = 'block';
}

function hideTooltip() {
  gtt.style.display = 'none';
}

document.getElementById('searchInput').addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(); });

document.addEventListener('click',e=>{ if(!e.target.closest('.cat-item')) document.querySelectorAll('.cat-btn.open').forEach(b=>b.classList.remove('open')); });

document.getElementById('results').innerHTML=`<div class="empty-state"><div class="empty-icon">⚔️</div><div class="empty-title">Select an item from the menu</div><div class="empty-sub">Choose category → type → item, or type an Item ID</div></div>`;
</script>
<div id="globalTooltip">
  <div class="tt-top">
    <div class="tt-img-wrap">
      <img id="ttImg" src="" alt="">
      <div class="tt-img-tier" id="ttTier"></div>
    </div>
    <div class="tt-head">
      <div class="tt-name" id="ttName"></div>
      <div class="tt-quality" id="ttQuality"></div>
    </div>
  </div>
  <div class="tt-body">
    <div class="tt-row"><span class="tt-label">City</span><span class="tt-val" id="ttCity"></span></div>
    <div class="tt-div"></div>
    <div class="tt-row"><span class="tt-label">💚 Sell Price</span><span class="tt-val tt-sell" id="ttSell"></span></div>
    <div class="tt-row"><span class="tt-label">🔵 Buy Price</span><span class="tt-val tt-buy" id="ttBuy"></span></div>
    <div class="tt-div"></div>
    <div class="tt-row"><span class="tt-label">🕐 Updated</span><span class="tt-val" id="ttTime"></span></div>
  </div>
</div>
</body>
</html>
