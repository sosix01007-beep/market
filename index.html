
<style>
*{box-sizing:border-box;margin:0;padding:0}
#app{display:flex;flex-direction:column;height:620px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;font-family:var(--font-sans)}
#topbar{padding:12px 18px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between}
#topbar-left{display:flex;align-items:center;gap:10px}
#live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
#online-count{font-size:12px;color:var(--color-text-secondary)}
#room-title{font-size:15px;font-weight:500;color:var(--color-text-primary)}
#topbar-right{display:flex;gap:6px}
.room-pill{font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);cursor:pointer;color:var(--color-text-secondary);background:transparent;transition:all 0.15s}
.room-pill.active{background:#6366f1;color:#fff;border-color:#6366f1}
#messages{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:8px}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:var(--color-border-secondary);border-radius:2px}
.msg{display:flex;flex-direction:column;gap:2px;animation:fadeup 0.2s ease}
@keyframes fadeup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.me{align-items:flex-end}
.msg.other{align-items:flex-start}
.msg-meta{display:flex;align-items:center;gap:6px}
.msg.me .msg-meta{flex-direction:row-reverse}
.avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.sender-name{font-size:11px;color:var(--color-text-secondary)}
.bubble{max-width:68%;padding:8px 13px;border-radius:16px;font-size:13.5px;line-height:1.5;word-break:break-word}
.msg.me .bubble{background:#6366f1;color:#fff;border-bottom-right-radius:4px}
.msg.other .bubble{background:var(--color-background-secondary);color:var(--color-text-primary);border-bottom-left-radius:4px}
.msg-time{font-size:10px;color:var(--color-text-secondary);padding:0 4px}
.react-row{display:flex;gap:4px;padding:0 4px}
.react-btn{font-size:13px;padding:2px 7px;border-radius:10px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:3px}
.react-btn:hover{background:var(--color-background-secondary);border-color:var(--color-border-secondary)}
.react-btn span{font-size:10px;color:var(--color-text-secondary)}
.react-btn.lit{background:#EEF2FF;border-color:#a5b4fc}
.typing-indicator{display:flex;align-items:center;gap:6px;padding:4px 0}
.typing-dots{display:flex;gap:3px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--color-text-secondary);animation:blink 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}
.typing-text{font-size:11px;color:var(--color-text-secondary)}
#bottom{padding:10px 14px;border-top:0.5px solid var(--color-border-tertiary)}
#name-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
#my-name{flex:0 0 auto;width:90px;font-size:12px;height:30px;padding:0 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
#my-name:focus{outline:none;border-color:#6366f1}
.color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s}
.color-dot.selected{border-color:var(--color-text-primary)}
#input-row{display:flex;gap:8px;align-items:center}
#emoji-bar{display:flex;gap:4px;margin-bottom:6px}
.eq{font-size:18px;cursor:pointer;padding:2px 4px;border-radius:6px;transition:transform 0.1s}
.eq:hover{transform:scale(1.3)}
#msg-input{flex:1;height:40px;padding:0 14px;border:0.5px solid var(--color-border-secondary);border-radius:20px;font-size:13.5px;background:var(--color-background-primary);color:var(--color-text-primary)}
#msg-input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.12)}
#send-btn{width:40px;height:40px;border-radius:50%;background:#6366f1;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.1s,opacity 0.15s}
#send-btn:hover{opacity:0.88}
#send-btn:active{transform:scale(0.93)}
</style>

<h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">แชทสาธารณะ ทุกคนเห็นข้อความพร้อมกัน</h2>

<div id="app">
  <div id="topbar">
    <div id="topbar-left">
      <div id="live-dot"></div>
      <span id="room-title">ห้องทั่วไป</span>
      <span id="online-count">3 คนออนไลน์</span>
    </div>
    <div id="topbar-right">
      <button class="room-pill active" onclick="switchRoom(this,'ห้องทั่วไป')">ทั่วไป</button>
      <button class="room-pill" onclick="switchRoom(this,'เกม & ดนตรี')">เกม</button>
      <button class="room-pill" onclick="switchRoom(this,'ศิลปะ & สร้างสรรค์')">ศิลปะ</button>
    </div>
  </div>

  <div id="messages"></div>

  <div id="bottom">
    <div id="name-row">
      <input id="my-name" placeholder="ชื่อของคุณ" value="คุณ" oninput="updateMyColor()" />
      <div style="display:flex;gap:6px;margin-left:4px" id="color-picks"></div>
    </div>
    <div id="emoji-bar">
      <span class="eq" onclick="addEmoji('😂')">😂</span>
      <span class="eq" onclick="addEmoji('🔥')">🔥</span>
      <span class="eq" onclick="addEmoji('😭')">😭</span>
      <span class="eq" onclick="addEmoji('👀')">👀</span>
      <span class="eq" onclick="addEmoji('💀')">💀</span>
      <span class="eq" onclick="addEmoji('🫶')">🫶</span>
      <span class="eq" onclick="addEmoji('✨')">✨</span>
      <span class="eq" onclick="addEmoji('🤙')">🤙</span>
    </div>
    <div id="input-row">
      <input id="msg-input" placeholder="พิมพ์อะไรก็ได้..." />
      <button id="send-btn" aria-label="ส่ง">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const PALETTES=[
  {bg:'#EEF2FF',txt:'#4338ca'},{bg:'#FDF2F8',txt:'#9d174d'},{bg:'#ECFDF5',txt:'#065f46'},
  {bg:'#FFF7ED',txt:'#9a3412'},{bg:'#EFF6FF',txt:'#1e40af'},{bg:'#FEF9C3',txt:'#854d0e'}
];
let myColorIdx=0;
const colorPicks=document.getElementById('color-picks');
PALETTES.forEach((c,i)=>{
  const d=document.createElement('div');
  d.className='color-dot'+(i===0?' selected':'');
  d.style.background=c.bg;
  d.style.outline=`1.5px solid ${c.txt}`;
  d.onclick=()=>{myColorIdx=i;document.querySelectorAll('.color-dot').forEach((x,j)=>x.classList.toggle('selected',j===i));};
  colorPicks.appendChild(d);
});

const ROOMS={'ห้องทั่วไป':[],'เกม & ดนตรี':[],'ศิลปะ & สร้างสรรค์':[]};
let currentRoom='ห้องทั่วไป';

const BOT_NAMES=[['มิว','#FDF2F8','#9d174d'],['อาร์ม','#EEF2FF','#4338ca'],['น้ำ','#ECFDF5','#065f46'],['บิ๊ก','#FFF7ED','#9a3412']];
const BOT_MSGS={
  'ห้องทั่วไป':['สวัสดีทุกคน~','ใครออนไลน์บ้าง?','วันนี้อากาศดีจัง','กินข้าวยัง?','รอบนี้ไปไหนกัน','เย็นๆ ว่ากันยังไง','คุยกันเยอะๆ นะ!','มาแล้วจ้า 👋'],
  'เกม & ดนตรี':['เล่นอะไรอยู่?','Valorant ใครไปด้วย','เพลงใหม่ฟังอยู่ 🔥','ใครอัพเดตแล้ว?','rank ขึ้นมาอีกแล้ว','queue ไปด้วยกันไหม','ชอบ indie เหมือนกันเลย'],
  'ศิลปะ & สร้างสรรค์':['วาดรูปอยู่ค่ะ','งานใหม่โพสต์แล้ว ✨','แรงบันดาลใจหายไปไหน','ใครชอบ pixel art บ้าง','ถ่ายรูปมาแชร์กันได้เลย','ไอเดียมันไหลลื่นวันนี้']
};

function now(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}

function addMsg(sender,text,isMe,bgColor,txtColor,roomKey){
  const room=roomKey||currentRoom;
  ROOMS[room].push({sender,text,isMe,bgColor,txtColor,time:now(),reacts:{},id:Date.now()+Math.random()});
  if(room===currentRoom)renderMessages();
}

function renderMessages(){
  const el=document.getElementById('messages');
  const msgs=ROOMS[currentRoom];
  if(!msgs.length){el.innerHTML='<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--color-text-secondary);font-size:13px">ยังไม่มีข้อความ มาเริ่มคุยกันเลย!</div>';return;}
  el.innerHTML=msgs.map((m,i)=>{
    const me=m.isMe;
    const initials=m.sender.charAt(0).toUpperCase();
    const reactHtml=Object.entries(m.reacts).map(([e,cnt])=>`<button class="react-btn${m.myReacts&&m.myReacts[e]?' lit':''}" onclick="toggleReact(${i},'${e}')">${e}<span>${cnt}</span></button>`).join('');
    return `<div class="msg ${me?'me':'other'}">
      <div class="msg-meta">
        <div class="avatar" style="background:${m.bgColor};color:${m.txtColor}">${initials}</div>
        <span class="sender-name">${m.sender}</span>
        <span class="msg-time">${m.time}</span>
      </div>
      <div class="bubble" onmouseenter="showReactBar(${i})" id="bubble-${i}">${m.text}</div>
      <div class="react-row" id="react-${i}">${reactHtml}</div>
    </div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

function toggleReact(idx,emoji){
  const m=ROOMS[currentRoom][idx];
  if(!m.myReacts)m.myReacts={};
  if(m.myReacts[emoji]){m.reacts[emoji]--;if(m.reacts[emoji]<=0)delete m.reacts[emoji];delete m.myReacts[emoji];}
  else{m.reacts[emoji]=(m.reacts[emoji]||0)+1;m.myReacts[emoji]=true;}
  renderMessages();
}

function showReactBar(idx){
  const row=document.getElementById('react-'+idx);
  if(!row)return;
  const m=ROOMS[currentRoom][idx];
  const existing=Object.keys(m.reacts||{});
  const quick=['❤️','😂','🔥','👍','😮'];
  const extra=quick.filter(e=>!existing.includes(e));
  if(extra.length){
    const frag=document.createDocumentFragment();
    extra.slice(0,2).forEach(e=>{
      const b=document.createElement('button');
      b.className='react-btn';b.innerHTML=e;
      b.onclick=()=>toggleReact(idx,e);
      frag.appendChild(b);
    });
    row.appendChild(frag);
  }
}

function send(){
  const name=document.getElementById('my-name').value.trim()||'คุณ';
  const text=document.getElementById('msg-input').value.trim();
  if(!text)return;
  const c=PALETTES[myColorIdx];
  addMsg(name,text,true,c.bg,c.txt);
  document.getElementById('msg-input').value='';
  scheduleBot();
}

function addEmoji(e){document.getElementById('msg-input').value+=e;document.getElementById('msg-input').focus()}

function switchRoom(btn,name){
  document.querySelectorAll('.room-pill').forEach(x=>x.classList.remove('active'));
  btn.classList.add('active');
  currentRoom=name;
  document.getElementById('room-title').textContent=name;
  const counts=[3,5,2];
  const idx=['ห้องทั่วไป','เกม & ดนตรี','ศิลปะ & สร้างสรรค์'].indexOf(name);
  document.getElementById('online-count'+('')).textContent=(counts[idx]||2)+' คนออนไลน์';
  document.getElementById('online-count').textContent=(counts[idx]||2)+' คนออนไลน์';
  renderMessages();
}

let botTimer=null;
function scheduleBot(){
  if(botTimer)clearTimeout(botTimer);
  botTimer=setTimeout(()=>{
    showTyping();
    setTimeout(()=>{
      hideTyping();
      const bot=BOT_NAMES[Math.floor(Math.random()*BOT_NAMES.length)];
      const msgs=BOT_MSGS[currentRoom]||BOT_MSGS['ห้องทั่วไป'];
      const text=msgs[Math.floor(Math.random()*msgs.length)];
      addMsg(bot[0],text,false,bot[1],bot[2]);
    },1400);
  },1200+Math.random()*800);
}

let typingEl=null;
function showTyping(){
  const bot=BOT_NAMES[Math.floor(Math.random()*BOT_NAMES.length)];
  const el=document.getElementById('messages');
  const div=document.createElement('div');
  div.className='typing-indicator';div.id='typing';
  div.innerHTML=`<div class="avatar" style="background:${bot[1]};color:${bot[2]};width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500">${bot[0][0]}</div><div class="typing-dots"><span></span><span></span><span></span></div><span class="typing-text">${bot[0]} กำลังพิมพ์...</span>`;
  el.appendChild(div);el.scrollTop=el.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove();}

document.getElementById('send-btn').addEventListener('click',send);
document.getElementById('msg-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});

const seed=[
  ['มิว','สวัสดีทุกคนนน 😊',false,'#FDF2F8','#9d174d'],
  ['อาร์ม','มาแล้วจ้า ใครอยู่บ้าง?',false,'#EEF2FF','#4338ca'],
  ['น้ำ','วันนี้อากาศดีมากเลย 🌤️',false,'#ECFDF5','#065f46'],
];
seed.forEach((s,i)=>{
  const [sender,text,isMe,bg,txt]=s;
  setTimeout(()=>{
    ROOMS['ห้องทั่วไป'].push({sender,text,isMe,bgColor:bg,txtColor:txt,time:now(),reacts:i===0?{'❤️':2,'😂':1}:{},id:Date.now()+i});
    renderMessages();
  },i*120);
});

setTimeout(()=>{
  ROOMS['เกม & ดนตรี'].push({sender:'บิ๊ก',text:'Valorant ใครไปด้วยไหม?',isMe:false,bgColor:'#FFF7ED',txtColor:'#9a3412',time:now(),reacts:{'🔥':3},id:Date.now()});
  ROOMS['ศิลปะ & สร้างสรรค์'].push({sender:'มิว',text:'งานใหม่โพสต์แล้วนะคะ ✨',isMe:false,bgColor:'#FDF2F8',txtColor:'#9d174d',time:now(),reacts:{},id:Date.now()+1});
},400);
</script>
